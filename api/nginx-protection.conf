# Nginx 保护配置（Apache 的 .htaccess 在 Nginx 下不生效）
# 将此文件内容添加到你的 server 块中，或 include 此文件

# 保护敏感 PHP 和文本文件不被直接访问
location ~ ^/api/(config\.php|init\.php|cheat_code\.txt)$ {
    deny all;
    return 403;
}

# 保护 data 目录
location ^~ /data/ {
    deny all;
    return 403;
}

# 保护 sensitive_words 目录（防止词库泄露）
location ^~ /sensitive_words/ {
    deny all;
    return 403;
}
